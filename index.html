<script>

async function guardarPostulante() {

  const calculo = calcularAutomatico();

  const puntaje = calculo.total;

  const postulante = {

    nombre: document.getElementById("nombre").value,
    edad: document.getElementById("edad").value,
    telefono: document.getElementById("telefono").value,
    sector: document.getElementById("sector").value,
    horario: document.getElementById("horario").value,
    experiencia: document.getElementById("experiencia").value,

    p1: document.getElementById("p1").value,
    p2: document.getElementById("p2").value,
    p3: document.getElementById("p3").value,
    p4: document.getElementById("p4").value,
    p5: document.getElementById("p5").value,

    a1: document.getElementById("a1").value,
    a2: document.getElementById("a2").value,
    a3: document.getElementById("a3").value,
    a4: document.getElementById("a4").value,
    a5: document.getElementById("a5").value,

    puntaje: puntaje,

    estado: obtenerEstado(puntaje),

    fecha: new Date().toLocaleString()

  };

  try {

    const response = await fetch(GOOGLE_SCRIPT_URL, {

      method: "POST",

      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },

      body: JSON.stringify(postulante)

    });

    document.getElementById("resultado").style.display = "block";

    document.getElementById("formPostulacion").reset();

  } catch(error) {

    console.log(error);

    alert("Error enviando formulario");

  }

}

</script>
